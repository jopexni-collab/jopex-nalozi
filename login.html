<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prijava – JoPeX</title>
<style>
:root{--blue:#1a5fa8;--dark:#134a85;--bg:#f3f5f8;--border:#dde3ea;--red:#c0392b;}
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
     font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;
      padding:34px 32px;width:100%;max-width:360px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
h1{margin:0 0 4px;font-size:19px;color:var(--dark);}
p{margin:0 0 22px;font-size:13px;color:#6b7a8d;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fg label{font-size:12px;font-weight:600;color:#6b7a8d;}
.fg input{font:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--border);border-radius:6px;}
.fg input:focus{outline:2px solid var(--blue);outline-offset:1px;border-color:var(--blue);}
.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;
     border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;}
.btn:hover{background:var(--dark);}
.btn:disabled{background:#9fb3c8;cursor:not-allowed;}
#msg{margin-top:12px;padding:10px;border-radius:7px;font-size:13px;display:none;
     background:#fbe9e7;color:var(--red);border:1px solid #f3c6c0;}
</style>
</head>
     <!-- v2 -->
<body>
<div class="card">
  <h1>📋 JoPeX Nalozi</h1>
  <p>Prijavite se sa radnim email-om.</p>
  <form id="f">
    <div class="fg"><label>Email</label>
      <input type="email" id="email" required autocomplete="username"></div>
    <div class="fg"><label>Lozinka</label>
      <input type="password" id="pw" required autocomplete="current-password"></div>
    <button class="btn" id="btn">Prijavi se</button>
    <div id="msg"></div>
  </form>
</div>
<script>
document.getElementById('f').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Prijavljivanje...';
  try {
    const r = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email: document.getElementById('email').value,
                            password: document.getElementById('pw').value}),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    location.href = 'index.html';
  } catch(err) {
    msg.textContent = '✗ ' + err.message; msg.style.display='block';
    btn.disabled=false; btn.textContent='Prijavi se';
  }
});
</script>
</body></html>
