<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Novi nalog – JoPeX</title>
<style>
:root{--blue:#1a5fa8;--dark:#134a85;--bg:#f3f5f8;--border:#dde3ea;--red:#c0392b;--green:#1f8a4c;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);}
header{background:var(--blue);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
header h1{margin:0;font-size:17px;}
header nav{display:flex;gap:12px;align-items:center;}
header nav a{color:#fff;text-decoration:none;font-size:12.5px;opacity:.9;border:1px solid rgba(255,255,255,.4);padding:5px 11px;border-radius:6px;}
header nav a:hover{opacity:1;background:rgba(255,255,255,.12);}
#who{font-size:12.5px;opacity:.8;}
main{max-width:760px;margin:24px auto;padding:0 16px;}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:22px 26px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card h2{margin:0 0 16px;font-size:15px;color:var(--dark);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.row.full{grid-template-columns:1fr;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:12px;font-weight:600;color:#6b7a8d;}
.fg label.req::after{content:' *';color:var(--red);}
.fg input,.fg select,.fg textarea{font:inherit;font-size:13.5px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:2px solid var(--blue);border-color:var(--blue);}
.fg textarea{resize:vertical;min-height:68px;}
.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;}
.btn:hover{background:var(--dark);}
.btn:disabled{background:#9fb3c8;cursor:not-allowed;}
#msg{margin-top:12px;padding:10px 13px;border-radius:7px;font-size:13px;display:none;}
.ok{background:#e3f5ea;color:var(--green);border:1px solid #b9e4c9;}
.err{background:#fbe9e7;color:var(--red);border:1px solid #f3c6c0;}
</style>
</head>
<body>
<header>
  <h1>📋 Novi radni nalog</h1>
  <nav>
    <span id="who"></span>
    <a href="home.html">← Početna</a>
    <a href="lista.html">Svi nalozi</a>
    <a href="#" id="logout">Odjava</a>
  </nav>
</header>
<main>
<div class="card">
  <h2>Podaci o poslu</h2>
  <form id="f">
    <div class="row">
      <div class="fg">
        <label class="req">Zadatak</label>
        <select id="zadatak" required onchange="prikaziSlobodanZadatak()">
          <option value="">— izaberi —</option>
          <option>Kuhinjska ploča</option><option>Sto</option>
          <option>Klupice, Step</option><option>Na Mjeru</option>
          <option>Usluge Mašina</option><option>Usluge WJ</option>
          <option value="__slobodno__">Slobodno (upiši sam)</option>
        </select>
        <input type="text" id="zadatak-slobodno" placeholder="Upiši zadatak..." style="display:none;margin-top:6px;">
      </div>
      <div class="fg">
        <label>Prioritet</label>
        <select id="prioritet">
          <option>Normal</option><option>Hitno</option><option>Zakazano</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="fg" id="ugovorio-fg">
        <label class="req">Ugovorio</label>
        <select id="ugovorio" required>
          <option value="">— učitavanje... —</option>
        </select>
        <div id="ugovorio-auto" style="display:none;font:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:#f8f9fc;color:var(--dark);"></div>
      </div>
      <div class="fg">
        <label>Status</label>
        <select id="status">
          <option>Nije Započeto</option><option>Zakazano</option>
          <option>U radu</option><option>Čeka isporuku</option>
          <option>Isporučeno</option><option>Kasni</option><option>Otkazano</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="fg">
        <label>Naručilac</label>
        <input list="kupci-list" id="narucilac" placeholder="Ime / firma">
        <datalist id="kupci-list"></datalist>
      </div>
      <div class="fg">
        <label>Materijal</label>
        <select id="materijal">
          <option value="">— izaberi —</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="fg"><label>Početak</label><input type="date" id="pocetak"></div>
      <div class="fg"><label>Planirani završetak</label><input type="date" id="zavrsetak"></div>
    </div>
    <div class="row full">
      <div class="fg"><label>Napomena</label>
        <textarea id="napomena" placeholder="Specifikacija, detalji..."></textarea>
      </div>
    </div>
    <div class="row">
      <div class="fg"><label>Link skica</label>
        <div style="display:flex;gap:6px;">
          <input type="text" id="link_skica" placeholder="https://..." style="flex:1;">
          <button type="button" onclick="document.getElementById('foto-skica').click()" style="flex-shrink:0;background:#eef4fc;border:1px solid var(--blue);color:var(--blue);border-radius:6px;padding:0 12px;cursor:pointer;font-size:16px;" title="Uslikaj skicu">📷</button>
          <input type="file" id="foto-skica" accept="image/*" capture="environment" style="display:none;" onchange="uploadSlikaZaPolje(this,'link_skica')">
        </div>
        <div id="foto-skica-status" style="font-size:11px;color:#8b96a5;margin-top:2px;display:none;"></div>
      </div>
      <div class="fg"><label>Link ponuda</label>
        <div style="display:flex;gap:6px;">
          <input type="text" id="link_ponuda" placeholder="https://..." style="flex:1;">
          <button type="button" onclick="document.getElementById('foto-ponuda').click()" style="flex-shrink:0;background:#eef4fc;border:1px solid var(--blue);color:var(--blue);border-radius:6px;padding:0 12px;cursor:pointer;font-size:16px;" title="Uslikaj ponudu">📷</button>
          <input type="file" id="foto-ponuda" accept="image/*" capture="environment" style="display:none;" onchange="uploadSlikaZaPolje(this,'link_ponuda')">
        </div>
        <div id="foto-ponuda-status" style="font-size:11px;color:#8b96a5;margin-top:2px;display:none;"></div>
      </div>
    </div>
    <div class="row" id="fin-row" style="display:none;">
      <div class="fg"><label>Ugovorena suma (KM)</label><input type="number" id="suma" step="0.01" min="0" value="0"></div>
      <div class="fg"><label>Avans (KM)</label><input type="number" id="avans" step="0.01" min="0" value="0"></div>
    </div>
    <button type="submit" class="btn" id="btn">Sačuvaj radni nalog</button>
    <div id="msg"></div>
  </form>
</div>
</main>
<script>
const API='';
let me=null;

function prikaziSlobodanZadatak(){
  const izabrano=document.getElementById('zadatak').value;
  const polje=document.getElementById('zadatak-slobodno');
  polje.style.display=izabrano==='__slobodno__'?'block':'none';
  if(izabrano==='__slobodno__') polje.focus();
}

// Smanjuje sliku prije slanja — nema potrebe za punom rezolucijom telefona (obično
// 3000-4000px, više MB) za skicu/ponudu koja treba samo da bude čitljiva. Smanjuje na
// max 1600px po dužoj strani i kompresuje kao JPEG — obično 10-20x manja datoteka.
function smanjiSliku(file, maxDimenzija = 1600, kvalitet = 0.75){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxDimenzija || height > maxDimenzija) {
        if (width > height) { height = Math.round(height * maxDimenzija / width); width = maxDimenzija; }
        else { width = Math.round(width * maxDimenzija / height); height = maxDimenzija; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        if (!blob) return reject(new Error('Greška pri obradi slike.'));
        resolve(blob);
      }, 'image/jpeg', kvalitet);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Slika se ne može učitati.')); };
    img.src = url;
  });
}

async function uploadSlikaZaPolje(inputEl, targetFieldId){
  const file=inputEl.files?.[0];
  if(!file) return;
  const tip=targetFieldId==='link_ponuda'?'ponuda':'skica';
  const statusEl=document.getElementById(inputEl.id+'-status');
  statusEl.style.display='block';
  statusEl.style.color='#8b96a5';
  statusEl.textContent='🔧 Smanjivanje slike...';
  try{
    const smanjenaBlob=await smanjiSliku(file);
    statusEl.textContent=`📤 Otpremanje slike... (${(smanjenaBlob.size/1024).toFixed(0)} KB, bilo ${(file.size/1024).toFixed(0)} KB)`;
    const b64=await new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result.split(',')[1]);
      reader.onerror=reject;
      reader.readAsDataURL(smanjenaBlob);
    });
    const r=await fetch(API+'/api/upload/slika',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({slika_b64:b64, tip}),
    });
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Greška pri otpremanju.');
    document.getElementById(targetFieldId).value=d.link;
    statusEl.style.color='var(--green)';
    statusEl.textContent='✓ Slika otpremljena i link popunjen.';
  }catch(err){
    statusEl.style.color='var(--red)';
    statusEl.textContent='✗ '+err.message;
  }finally{
    inputEl.value=''; // resetuj da se ista slika moze ponovo izabrati ako treba
  }
}

async function checkAuth(){
  try{
    const r=await fetch(API+'/api/auth/me');
    if(!r.ok){location.href='login.html';return;}
    me=await r.json();
    document.getElementById('who').textContent='👤 '+me.ime_prezime;

    // Provjera pristupa — samo admin i unos_naloga
    if(me.rola!=='admin' && !me.unos_naloga){
      location.href='home.html';
      return;
    }

    // Finansijska polja — prikazuju se svima koji mogu da kreiraju nalog (prošli su
    // provjeru iznad), pošto će oni automatski postati "Ugovorio" za ovaj NOVI nalog —
    // dali su klijentu cijenu na licu mjesta (npr. waterjet usluga) i treba transparentno
    // da je upišu, bez obzira imaju li "Ponude" dozvolu.
    document.getElementById('fin-row').style.display='';

    // "Ugovorio" = "kreirao" (isti koncept). Admin i "Ponude" dozvola biraju slobodno iz
    // liste (mogu dogovarati posao i u ime nekog drugog). Obični operater automatski
    // POSTAJE "Ugovorio" na svom novom nalogu — ne bira se (dropdown bi ionako pokazivao
    // samo Ponude-ljude, ne i njega samog), pa mu umjesto toga pokazujemo njegovo ime.
    if(me.rola!=='admin' && !me.moze_ugovarati){
      document.getElementById('ugovorio').style.display='none';
      document.getElementById('ugovorio').required=false;
      const auto=document.getElementById('ugovorio-auto');
      auto.style.display='block';
      auto.textContent=me.ime_prezime+' (ti — automatski)';
    }
  }catch{location.href='login.html';}
}

document.getElementById('logout').onclick=async e=>{
  e.preventDefault();
  await fetch(API+'/api/auth/logout',{method:'POST'});
  location.href='login.html';
};

async function loadConfig(){
  let cfg=null;
  try{
    const r=await fetch(API+'/api/config',{signal:AbortSignal.timeout(4000)});
    if(r.ok){cfg=await r.json();localStorage.setItem('jopex_config',JSON.stringify(cfg));}
  }catch{}
  if(!cfg){const cached=localStorage.getItem('jopex_config');if(cached){cfg=JSON.parse(cached);}}
  if(!cfg) return;
  const matSel=document.getElementById('materijal');
  cfg.materijali.forEach(m=>{matSel.append(new Option(m.naziv,m.naziv));});
  const ugSel=document.getElementById('ugovorio');
  ugSel.innerHTML='<option value="">— izaberi —</option>';
  cfg.ugovaraci.forEach(u=>ugSel.append(new Option(u.ime_prezime,u.id)));
  const dl=document.getElementById('kupci-list');
  cfg.kupci.forEach(k=>{const o=document.createElement('option');o.value=k.naziv;dl.append(o);});
}

document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const msg=document.getElementById('msg');
  const btn=document.getElementById('btn');
  msg.className='';msg.style.display='none';

  const zadatakIzabran=document.getElementById('zadatak').value;
  const zadatakFinalno=zadatakIzabran==='__slobodno__'
    ? document.getElementById('zadatak-slobodno').value.trim()
    : zadatakIzabran;
  if(zadatakIzabran==='__slobodno__' && !zadatakFinalno){
    msg.className='err';msg.style.display='block';
    msg.textContent='✗ Upišite zadatak u polje "Slobodno".';
    return;
  }

  btn.disabled=true;btn.textContent='Čuvanje...';
  const smijeCijenu=!!me;
  const body={
    zadatak:zadatakFinalno,
    prioritet:document.getElementById('prioritet').value,
    ugovorio_id:document.getElementById('ugovorio').value||null,
    status:document.getElementById('status').value,
    narucilac:document.getElementById('narucilac').value,
    materijal:document.getElementById('materijal').value,
    pocetak:document.getElementById('pocetak').value||null,
    planirani_zavrsetak:document.getElementById('zavrsetak').value||null,
    napomena:document.getElementById('napomena').value,
    link_skica:document.getElementById('link_skica').value,
    link_ponuda:document.getElementById('link_ponuda').value,
    ugovorena_suma:smijeCijenu?parseFloat(document.getElementById('suma').value)||0:undefined,
    avans:smijeCijenu?parseFloat(document.getElementById('avans').value)||0:undefined,
  };
  try{
    const r=await fetch(API+'/api/proizvodnja',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error);
    msg.className='ok';msg.style.display='block';
    msg.textContent=`✓ Sačuvano kao radni nalog #${d.r_br}.`;
    document.getElementById('f').reset();loadConfig();document.getElementById('zadatak-slobodno').style.display='none';
  }catch(err){
    msg.className='err';msg.style.display='block';
    msg.textContent='✗ '+err.message;
  }finally{btn.disabled=false;btn.textContent='Sačuvaj radni nalog';}
});

checkAuth();
loadConfig();
</script>
</body>
</html>
