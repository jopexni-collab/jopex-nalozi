<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Novi nalog – JoPeX</title>
<style>
:root{--blue:#1a5fa8;--dark:#134a85;--bg:#f3f5f8;--border:#dde3ea;--red:#c0392b;--green:#1f8a4c;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);}
header{background:var(--blue);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
header h1{margin:0;font-size:17px;}
header nav{display:flex;gap:12px;align-items:center;}
header nav a{color:#fff;text-decoration:none;font-size:12.5px;opacity:.9;
  border:1px solid rgba(255,255,255,.4);padding:5px 11px;border-radius:6px;}
header nav a:hover{opacity:1;background:rgba(255,255,255,.12);}
#who{font-size:12.5px;opacity:.8;}
main{max-width:760px;margin:24px auto;padding:0 16px;}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;
      padding:22px 26px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card h2{margin:0 0 16px;font-size:15px;color:var(--dark);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.row.full{grid-template-columns:1fr;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:12px;font-weight:600;color:#6b7a8d;}
.fg label.req::after{content:' *';color:var(--red);}
.fg input,.fg select,.fg textarea{font:inherit;font-size:13.5px;padding:8px 10px;
  border:1px solid var(--border);border-radius:6px;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:2px solid var(--blue);border-color:var(--blue);}
.fg textarea{resize:vertical;min-height:68px;}
.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;
     border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;}
.btn:hover{background:var(--dark);}
.btn:disabled{background:#9fb3c8;cursor:not-allowed;}
#msg{margin-top:12px;padding:10px 13px;border-radius:7px;font-size:13px;display:none;}
.ok{background:#e3f5ea;color:var(--green);border:1px solid #b9e4c9;}
.err{background:#fbe9e7;color:var(--red);border:1px solid #f3c6c0;}
/* Prioritet dugmad */
.prioritet-group{display:flex;gap:6px;}
.prioritet-group button{flex:1;padding:8px 4px;font:inherit;font-size:12.5px;font-weight:600;
  border:2px solid var(--border);border-radius:6px;cursor:pointer;background:#f8f9fb;color:#444;}
.prioritet-group button.active-normal{background:#e6f4ea;color:#1f8a4c;border-color:#1f8a4c;}
.prioritet-group button.active-hitno{background:#fce8e6;color:#c0392b;border-color:#c0392b;}
.prioritet-group button.active-zakazano{background:#fef3e2;color:#e67e22;border-color:#e67e22;}
</style>
</head>
<body>
<header>
  <h1>📋 Novi radni nalog</h1>
  <nav>
    <span id="who"></span>
    <a href="lista.html">Svi nalozi</a>
    <a href="#" id="logout">Odjava</a>
  </nav>
</header>
<main>
<div class="card">
  <h2>Podaci o poslu</h2>
  <form id="f">
    <div class="row">
      <div class="fg">
        <label class="req">Zadatak</label>
        <input list="zadatak-list" id="zadatak" placeholder="Izaberi ili upiši..." required>
        <datalist id="zadatak-list">
          <option>Kuhinjska ploča</option>
          <option>Sto</option>
          <option>Klupice, Step</option>
          <option>Na Mjeru</option>
          <option>Usluge Mašina</option>
          <option>Usluge WJ</option>
        </datalist>
      </div>
      <div class="fg">
        <label>Prioritet</label>
        <div class="prioritet-group">
          <button type="button" id="p-normal" class="active-normal" onclick="setPrioritet('Normal')">Normal</button>
          <button type="button" id="p-hitno" onclick="setPrioritet('Hitno')">Hitno</button>
          <button type="button" id="p-zakazano" onclick="setPrioritet('Zakazano')">Zakazano</button>
        </div>
        <input type="hidden" id="prioritet" value="Normal">
      </div>
    </div>
    <div class="row">
      <div class="fg">
        <label class="req">Ugovorio</label>
        <select id="ugovorio" required>
          <option value="">— učitavanje... —</option>
        </select>
      </div>
      <div class="fg">
        <label>Status</label>
        <select id="status">
          <option>Nije Započeto</option>
          <option>Zakazano</option>
          <option>U radu</option>
          <option>Čeka isporuku</option>
          <option>Isporučeno</option>
          <option>Otkazano</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="fg">
        <label>Naručilac</label>
        <input list="kupci-list" id="narucilac" placeholder="Ime / firma">
        <datalist id="kupci-list"></datalist>
      </div>
      <div class="fg">
        <label>Materijal</label>
        <input list="mat-list" id="materijal" placeholder="Izaberi ili upiši...">
        <datalist id="mat-list"></datalist>
      </div>
    </div>
    <div class="row">
      <div class="fg">
        <label>Plan. završetak</label>
        <input type="date" id="zavrsetak">
      </div>
      <div class="fg">
        <label>Napomena</label>
        <input type="text" id="napomena" placeholder="Specifikacija, detalji...">
      </div>
    </div>
    <div class="row" id="fin-row">
      <div class="fg"><label>Ugovorena suma (KM)</label>
        <input type="number" id="suma" step="0.01" min="0" value="0"></div>
      <div class="fg"><label>Avans (KM)</label>
        <input type="number" id="avans" step="0.01" min="0" value="0"></div>
    </div>
    <button type="submit" class="btn" id="btn">Sačuvaj radni nalog</button>
    <div id="msg"></div>
  </form>
</div>
</main>
<script>
const API = '';
let me = null;
let prioritet = 'Normal';

function setPrioritet(p){
  prioritet = p;
  document.getElementById('prioritet').value = p;
  document.getElementById('p-normal').className = p==='Normal'?'active-normal':'';
  document.getElementById('p-hitno').className = p==='Hitno'?'active-hitno':'';
  document.getElementById('p-zakazano').className = p==='Zakazano'?'active-zakazano':'';
}

async function checkAuth() {
  try {
    const r = await fetch(API + '/api/auth/me');
    if (!r.ok) { location.href = 'login.html'; return; }
    me = await r.json();
    document.getElementById('who').textContent = '👤 ' + me.ime_prezime;
    if (me.rola !== 'admin') document.getElementById('fin-row').style.display = 'none';
  } catch { location.href = 'login.html'; }
}

document.getElementById('logout').onclick = async e => {
  e.preventDefault();
  await fetch(API + '/api/auth/logout', {method:'POST'});
  location.href = 'login.html';
};

async function loadConfig() {
  let cfg = null;
  try {
    const r = await fetch(API + '/api/config', {signal: AbortSignal.timeout(4000)});
    if (r.ok) {
      cfg = await r.json();
      localStorage.setItem('jopex_config', JSON.stringify(cfg));
    }
  } catch {}
  if (!cfg) {
    const cached = localStorage.getItem('jopex_config');
    if (cached) { cfg = JSON.parse(cached); }
  }
  if (!cfg) return;

  // Materijali kao datalist
  const matDl = document.getElementById('mat-list');
  matDl.innerHTML = '';
  cfg.materijali.forEach(m => {
    const o = document.createElement('option'); o.value = m.naziv; matDl.append(o);
  });

  // Ugovarači
  const ugSel = document.getElementById('ugovorio');
  ugSel.innerHTML = '<option value="">— izaberi —</option>';
  cfg.ugovaraci.forEach(u => ugSel.append(new Option(u.ime_prezime, u.id)));

  // Kupci
  const dl = document.getElementById('kupci-list');
  dl.innerHTML = '';
  cfg.kupci.forEach(k => { const o = document.createElement('option'); o.value = k.naziv; dl.append(o); });
}

document.getElementById('f').addEventListener('submit', async e => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');
  msg.className=''; msg.style.display='none';
  btn.disabled=true; btn.textContent='Čuvanje...';

  // Datum ugovaranja = danas
  const danas = new Date().toISOString().split('T')[0];

  const body = {
    zadatak:             document.getElementById('zadatak').value,
    prioritet:           prioritet,
    ugovorio_id:         document.getElementById('ugovorio').value || null,
    status:              document.getElementById('status').value,
    narucilac:           document.getElementById('narucilac').value,
    materijal:           document.getElementById('materijal').value,
    pocetak:             danas, // automatski danas
    planirani_zavrsetak: document.getElementById('zavrsetak').value || null,
    napomena:            document.getElementById('napomena').value,
    ugovorena_suma: me?.rola==='admin' ? parseFloat(document.getElementById('suma').value)||0 : undefined,
    avans:          me?.rola==='admin' ? parseFloat(document.getElementById('avans').value)||0 : undefined,
  };

  try {
    const r = await fetch(API + '/api/proizvodnja', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    msg.className='ok'; msg.style.display='block';
    msg.textContent = `✓ Sačuvano kao radni nalog #${d.r_br}.`;
    document.getElementById('f').reset();
    setPrioritet('Normal');
    loadConfig();
  } catch(err) {
    msg.className='err'; msg.style.display='block';
    msg.textContent = '✗ ' + err.message;
  } finally { btn.disabled=false; btn.textContent='Sačuvaj radni nalog'; }
});

checkAuth();
loadConfig();
</script>
</body></html>
