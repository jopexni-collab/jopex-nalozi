<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Import – JoPeX</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--blue:#1a5fa8;--dark:#134a85;--bg:#f0f2f5;--border:#d0d7de;--green:#1f8a4c;--red:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);font-size:13px;}
header{background:var(--blue);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:15px;font-weight:700;}
header a{color:#fff;text-decoration:none;font-size:12px;border:1px solid rgba(255,255,255,.4);padding:4px 10px;border-radius:4px;}
main{max-width:960px;margin:24px auto;padding:0 16px;}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:24px;margin-bottom:20px;}
.card h2{font-size:14px;color:var(--dark);margin-bottom:16px;border-bottom:1px solid #eee;padding-bottom:10px;}
.drop-zone{border:2px dashed var(--border);border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;color:#6b7a8d;}
.drop-zone:hover,.drop-zone.over{border-color:var(--blue);background:#f0f4ff;color:var(--blue);}
.drop-zone input{display:none;}
.btn{font:inherit;font-size:13px;padding:8px 20px;border:none;border-radius:6px;cursor:pointer;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.preview{margin-top:16px;overflow:auto;max-height:320px;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#1f3864;color:#fff;padding:6px 8px;text-align:left;position:sticky;top:0;white-space:nowrap;}
tbody td{padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;}
tbody tr:nth-child(even) td{background:#f8f9fc;}
.msg{padding:10px 14px;border-radius:6px;margin-top:12px;font-size:13px;}
.msg.ok{background:#e6f4ea;color:var(--green);}
.msg.err{background:#fce8e6;color:var(--red);}
.msg.info{background:#e8f0fe;color:var(--blue);}
.progress{height:8px;background:#eee;border-radius:4px;margin-top:10px;}
.progress-bar{height:100%;background:var(--blue);border-radius:4px;transition:width .3s;width:0%;}
</style>
</head>
<body>
<header>
  <h1>📥 Import naloga iz Excel/CSV</h1>
  <a href="lista.html">← Radni nalozi</a>
</header>
<main>
  <div class="card">
    <h2>Izaberi Excel (.xlsx) ili CSV fajl iz Google Sheets</h2>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('file').click()">
      <div style="font-size:36px">📊</div>
      <div style="font-size:14px;font-weight:600;margin-top:8px">Klikni ili prevuci fajl ovdje</div>
      <p style="margin-top:6px;font-size:12px">Datoteka → Preuzmi → Microsoft Excel (.xlsx) ili CSV</p>
      <input type="file" id="file" accept=".xlsx,.xls,.csv">
    </div>
    <div id="preview-wrap" style="display:none">
      <div id="msg-parse"></div>
      <div class="preview" id="preview"></div>
      <div style="margin-top:14px;display:flex;gap:12px;align-items:center">
        <button class="btn btn-primary" id="btn-import" onclick="startImport()">✅ Importuj sve naloge</button>
        <span id="stat-rows" style="font-size:12px;color:#6b7a8d;"></span>
      </div>
      <div class="progress" id="pw" style="display:none"><div class="progress-bar" id="pb"></div></div>
      <div id="msg-import"></div>
    </div>
  </div>
</main>
<script>
const API='';
let parsedRows=[];

function parseDate(val){
  if(!val) return null;
  // Excel datum (broj dana od 1900-01-01)
  if(typeof val==='number'){
    const d=XLSX.SSF.parse_date_code(val);
    if(d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  // String formati
  let s=String(val).trim().replace(/\.$/,'');
  // DD.MM.YY ili DD.MM.YYYY
  let m=s.match(/^(\d{1,2})[./](\d{1,2})[./](\d{2,4})$/);
  if(m){
    let y=parseInt(m[3]); if(y<100) y+=2000;
    return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  if(s.match(/^\d{4}-\d{2}-\d{2}$/)) return s;
  return null;
}

function parseNum(val){
  if(val===null||val===undefined||val==='') return 0;
  if(typeof val==='number') return val;
  let s=String(val).replace(/["""]/g,'').trim();
  if(!s||s==='-') return 0;
  // Detektuj format: ako ima i tačku i zarez
  // Format 1.234,56 — tačka je separator hilj, zarez decimalni
  if(s.includes(',') && s.includes('.')){
    // Provjeri koja je zadnja: ako je zarez zadnji — decimalni separator
    if(s.lastIndexOf(',')>s.lastIndexOf('.'))
      s=s.replace(/\./g,'').replace(',','.');
    else
      s=s.replace(/,/g,'');
  } else if(s.includes(',')&&!s.includes('.')){
    // Samo zarez — decimalni separator
    s=s.replace(',','.');
  }
  // Tačka jedino kao decimalni separator — ostavi
  return parseFloat(s)||0;
}

function parseBool(val){
  if(val===null||val===undefined||val==='') return false;
  if(typeof val==='boolean') return val;
  if(typeof val==='number') return val===1;
  const v=String(val).toUpperCase().trim();
  if(v==='FALSE'||v==='NE'||v==='0'||v==='NO') return false;
  return v==='TRUE'||v==='DA'||v==='1'||v==='YES';
}

function mapRow(cols){
  // cols[0]=R.Br, [1]=Zadatak, [2]=Prioritet, [3]=Ugovorio, [4]=Narucilac
  // [5]=Materijal, [6]=Status, [7]=Pocetak, [8]=Plan.zavrsetak
  // [9]=Broj dana, [10]=Gotovo, [11]=Reklamacija, [12]=Napomena
  // [13]=Link skica, [14]=Link ponuda, [15]=Ugovorena Suma, [16]=Avans
  const g=i=>(cols[i]!==undefined&&cols[i]!==null)?cols[i]:'';
  const rBr=parseInt(g(0))||null;
  return {
    _r_br:                rBr,
    zadatak:              String(g(1)||'').trim()||'',
    prioritet:            String(g(2)||'Normal').trim()||'Normal',
    ugovorio:             String(g(3)||'').trim(),
    narucilac:            String(g(4)||'').trim(),
    materijal:            String(g(5)||'').trim(),
    status:               String(g(6)||'Nije Započeto').trim()||'Nije Započeto',
    pocetak:              parseDate(g(7)),
    planirani_zavrsetak:  parseDate(g(8)),
    gotovo:               parseBool(g(10)),
    reklamacija_dodatni_rad: String(g(11)||'').trim(),
    napomena:             String(g(12)||'').trim(),
    link_skica:           String(g(13)||'').trim(),
    link_ponuda:          String(g(14)||'').trim(),
    ugovorena_suma:       parseNum(g(15)),
    avans:                parseNum(g(16)),
  };
}

const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');loadFile(e.dataTransfer.files[0]);});
document.getElementById('file').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});

function loadFile(file){
  const r=new FileReader();
  r.onload=e=>{
    const data=new Uint8Array(e.target.result);
    const wb=XLSX.read(data,{type:'array',cellDates:false});
    const ws=wb.Sheets[wb.SheetNames[0]];
    // Čitaj kao array of arrays
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
    processData(aoa);
  };
  r.readAsArrayBuffer(file);
}

function processData(aoa){
  if(!aoa||aoa.length<2){
    document.getElementById('msg-parse').innerHTML='<div class="msg err">Fajl je prazan ili nema podataka.</div>';
    return;
  }
  // Preskoči header red (index 0), uzmi sve ostale koji imaju R.Br.
  const rows=[];
  for(let i=1;i<aoa.length;i++){
    const cols=aoa[i];
    const rbr=parseInt(cols[0]);
    if(isNaN(rbr)||rbr<=0) continue; // preskoči prazne i header
    rows.push(mapRow(cols));
  }
  parsedRows=rows.reverse(); // okreni - importuj od najstarijeg prema najnovijem

  document.getElementById('stat-rows').textContent=`${parsedRows.length} naloga za import`;

  const previewCols=[
    {l:'Zadatak',f:'zadatak'},{l:'Prioritet',f:'prioritet'},{l:'Naručilac',f:'narucilac'},
    {l:'Status',f:'status'},{l:'Ugovoreno',f:'pocetak'},{l:'Plan. završetak',f:'planirani_zavrsetak'},
    {l:'Gotovo ✓',f:'gotovo'},{l:'Iznos KM',f:'ugovorena_suma'},{l:'Avans',f:'avans'}
  ];
  document.getElementById('preview').innerHTML=`
    <table>
      <thead><tr>${previewCols.map(c=>`<th>${c.l}</th>`).join('')}</tr></thead>
      <tbody>${parsedRows.slice(0,15).map(r=>`<tr>${previewCols.map(c=>`<td>${r[c.f]??''}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
    ${parsedRows.length>15?`<p style="color:#999;font-size:11px;padding:6px;text-align:center">... i još ${parsedRows.length-15} redova</p>`:''}
  `;
  document.getElementById('preview-wrap').style.display='block';
  document.getElementById('msg-parse').innerHTML=`<div class="msg info">✓ Učitano ${parsedRows.length} naloga. Provjeri preview pa klikni Import.</div>`;
}

async function startImport(){
  const btn=document.getElementById('btn-import');
  btn.disabled=true;
  document.getElementById('pw').style.display='block';
  const pb=document.getElementById('pb');
  const mi=document.getElementById('msg-import');
  let ok=0,err=0;
  for(let i=0;i<parsedRows.length;i++){
    pb.style.width=Math.round(((i+1)/parsedRows.length)*100)+'%';
    try{
      const r=await fetch(`${API}/api/proizvodnja`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({...parsedRows[i], r_br_import: parsedRows[i]._r_br}),
      });
      if(r.ok) ok++; else err++;
    }catch(e){err++;}
  }
  mi.innerHTML=`<div class="msg ${err?'err':'ok'}">
    ${err?'⚠':'✓'} Importovano: <b>${ok}</b> naloga${err?` | Greška: <b>${err}</b>`:''}
  </div>`;
  btn.disabled=false;
  if(!err) setTimeout(()=>location.href='lista.html',2000);
}
</script>
</body>
</html>
