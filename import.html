<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Import CSV – JoPeX</title>
<style>
:root{--blue:#1a5fa8;--dark:#134a85;--bg:#f0f2f5;--border:#d0d7de;--green:#1f8a4c;--red:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);font-size:13px;}
header{background:var(--blue);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:15px;font-weight:700;}
header a{color:#fff;text-decoration:none;font-size:12px;border:1px solid rgba(255,255,255,.4);padding:4px 10px;border-radius:4px;}
main{max-width:960px;margin:24px auto;padding:0 16px;}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:24px;margin-bottom:20px;}
.card h2{font-size:14px;color:var(--dark);margin-bottom:16px;border-bottom:1px solid #eee;padding-bottom:10px;}
.drop-zone{border:2px dashed var(--border);border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;color:#6b7a8d;}
.drop-zone:hover,.drop-zone.over{border-color:var(--blue);background:#f0f4ff;color:var(--blue);}
.drop-zone input{display:none;}
.btn{font:inherit;font-size:13px;padding:8px 20px;border:none;border-radius:6px;cursor:pointer;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--dark);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.preview{margin-top:16px;overflow:auto;max-height:320px;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#1f3864;color:#fff;padding:6px 8px;text-align:left;position:sticky;top:0;white-space:nowrap;}
tbody td{padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;}
tbody tr:nth-child(even) td{background:#f8f9fc;}
.msg{padding:10px 14px;border-radius:6px;margin-top:12px;font-size:13px;}
.msg.ok{background:#e6f4ea;color:var(--green);}
.msg.err{background:#fce8e6;color:var(--red);}
.msg.info{background:#e8f0fe;color:var(--blue);}
.progress{height:8px;background:#eee;border-radius:4px;margin-top:10px;}
.progress-bar{height:100%;background:var(--blue);border-radius:4px;transition:width .3s;width:0%;}
</style>
</head>
<body>
<header>
  <h1>📥 Import CSV naloga</h1>
  <a href="lista.html">← Radni nalozi</a>
</header>
<main>
  <div class="card">
    <h2>Izaberi CSV fajl iz Google Sheets</h2>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('csvFile').click()">
      <div style="font-size:36px">📄</div>
      <div style="font-size:14px;font-weight:600;margin-top:8px">Klikni ili prevuci CSV fajl ovdje</div>
      <p style="margin-top:6px;font-size:12px">Datoteka → Preuzmi → Vrijednosti razdvojene zarezima (.csv)</p>
      <input type="file" id="csvFile" accept=".csv">
    </div>
    <div id="preview-wrap" style="display:none">
      <div id="msg-parse"></div>
      <div class="preview" id="preview"></div>
      <div style="margin-top:14px;display:flex;gap:12px;align-items:center">
        <button class="btn btn-primary" id="btn-import" onclick="startImport()">✅ Importuj sve naloge</button>
        <span id="stat-rows" style="font-size:12px;color:#6b7a8d;"></span>
      </div>
      <div class="progress" id="pw" style="display:none"><div class="progress-bar" id="pb"></div></div>
      <div id="msg-import"></div>
    </div>
  </div>
</main>
<script>
const API='';
let parsedRows=[];

function parseCSV(text){
  // Normalizuj line endings
  const lines=text.split(/\r?\n/);
  if(!lines.length) return [];
  function parseLine(line){
    const cols=[];
    let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){
        if(inQ&&line[i+1]==='"'){cur+='"';i++;} // escaped quote
        else inQ=!inQ;
      } else if(c===','&&!inQ){
        cols.push(cur.trim());cur='';
      } else cur+=c;
    }
    cols.push(cur.trim());
    return cols;
  }
  const header=parseLine(lines[0]);
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const cols=parseLine(lines[i]);
    if(cols.every(c=>!c)) continue;
    const row={};
    header.forEach((h,j)=>row[j]=(cols[j]||'').trim());
    row._raw=cols;
    rows.push(row);
  }
  return rows;
}

function parseDate(s){
  if(!s) return null;
  s=s.trim().replace(/\.$/,''); // ukloni tačku na kraju (10.07.26.)
  // DD.MM.YY ili DD.MM.YYYY
  let m=s.match(/^(\d{1,2})[./](\d{1,2})[./](\d{2,4})$/);
  if(m){
    let y=parseInt(m[3]);
    if(y<100) y+=2000;
    return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  // YYYY-MM-DD
  if(s.match(/^\d{4}-\d{2}-\d{2}$/)) return s;
  return null;
}

function parseNum(s){
  if(!s) return 0;
  // Format: "1.234,56" ili "1234,56" ili "1234.56"
  s=String(s).replace(/[""]/g,'').trim();
  if(!s) return 0;
  // Ako ima i tačku i zarez - tačka je separator hilj., zarez decimalni
  if(s.includes('.') && s.includes(',')) s=s.replace(/\./g,'').replace(',','.');
  // Samo zarez - zarez je decimalni
  else if(s.includes(',')) s=s.replace(',','.');
  return parseFloat(s)||0;
}

function parseBool(s){
  if(!s) return false;
  return s.toUpperCase()==='TRUE'||s==='1'||s.toUpperCase()==='DA';
}

// Mapiranje po poziciji kolone (0-based index)
// 0=R.Br, 1=Zadatak, 2=Prioritet, 3=Ugovorio, 4=Narucilac, 5=Materijal
// 6=Status, 7=Pocetak, 8=Plan.zavrsetak, 9=Broj dana, 10=Gotovo
// 11=Reklamacija, 12=Napomena, 13=Link skica, 14=Link ponuda
// 15=Ugovorena Suma, 16=Avans, 17=Za Naplatu
function mapRow(row){
  const c=row._raw||[];
  const get=i=>(c[i]||'').trim();
  return {
    zadatak:              get(1)||'',
    prioritet:            get(2)||'Normal',
    ugovorio:             get(3)||'',
    narucilac:            get(4)||'',
    materijal:            get(5)||'',
    status:               get(6)||'Nije Započeto',
    pocetak:              parseDate(get(7)),
    planirani_zavrsetak:  parseDate(get(8)),
    gotovo:               parseBool(get(10)),
    reklamacija_dodatni_rad: get(11)||'',
    napomena:             get(12)||'',
    link_skica:           get(13)||'',
    link_ponuda:          get(14)||'',
    ugovorena_suma:       parseNum(get(15)),
    avans:                parseNum(get(16)),
  };
}

const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');loadFile(e.dataTransfer.files[0]);});
document.getElementById('csvFile').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});

function loadFile(file){
  // Pokušaj UTF-8 prvo, pa Windows-1250
  const r=new FileReader();
  r.onload=e=>{
    let text=e.target.result;
    // Provjeri da li je OK (ima šumova?)
    if(text.includes('Ä') || text.includes('Å')){
      // Čita ponovo kao Windows-1250
      const r2=new FileReader();
      r2.onload=e2=>processCSV(e2.target.result);
      r2.readAsText(file,'windows-1250');
    } else {
      processCSV(text);
    }
  };
  r.readAsText(file,'UTF-8');
}

function processCSV(text){
  const raw=parseCSV(text);
  // Preskoči header red i prazne
  parsedRows=raw.filter(r=>{
    const id=parseInt((r._raw||[])[0]);
    return !isNaN(id)&&id>0;
  }).map(mapRow);

  document.getElementById('stat-rows').textContent=`${parsedRows.length} naloga za import`;

  const cols=['zadatak','prioritet','narucilac','materijal','status','pocetak','planirani_zavrsetak','ugovorena_suma','avans'];
  document.getElementById('preview').innerHTML=`
    <table>
      <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${parsedRows.slice(0,15).map(r=>`<tr>${cols.map(c=>`<td>${r[c]??''}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
    ${parsedRows.length>15?`<p style="color:#999;font-size:11px;padding:6px;text-align:center">... i još ${parsedRows.length-15} redova</p>`:''}
  `;
  document.getElementById('preview-wrap').style.display='block';
  document.getElementById('msg-parse').innerHTML=`<div class="msg info">✓ Učitano ${parsedRows.length} naloga. Provjeri preview pa klikni Import.</div>`;
}

async function startImport(){
  const btn=document.getElementById('btn-import');
  btn.disabled=true;
  document.getElementById('pw').style.display='block';
  const pb=document.getElementById('pb');
  const mi=document.getElementById('msg-import');
  let ok=0,err=0;
  for(let i=0;i<parsedRows.length;i++){
    pb.style.width=Math.round(((i+1)/parsedRows.length)*100)+'%';
    try{
      const r=await fetch(`${API}/api/proizvodnja`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(parsedRows[i]),
      });
      if(r.ok) ok++; else err++;
    }catch(e){err++;}
  }
  mi.innerHTML=`<div class="msg ${err?'err':'ok'}">
    ${err?'⚠':'✓'} Importovano: <b>${ok}</b> naloga${err?` | Greška: <b>${err}</b>`:''}
  </div>`;
  btn.disabled=false;
  if(!err) setTimeout(()=>location.href='lista.html',2000);
}
</script>
</body>
</html>
