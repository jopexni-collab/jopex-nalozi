<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kupci – JoPeX</title>
<style>
:root{--blue:#1a5fa8;--dark:#134a85;--bg:#f0f2f5;--border:#d0d7de;--green:#1f8a4c;--red:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);font-size:12.5px;}
header{background:var(--blue);color:#fff;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:14px;font-weight:700;}
header nav a{color:#fff;text-decoration:none;font-size:11px;border:1px solid rgba(255,255,255,.4);padding:3px 8px;border-radius:4px;margin-left:8px;}
main{max-width:1100px;margin:20px auto;padding:0 14px;}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.toolbar input{font:inherit;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:5px;min-width:220px;}
.btn{font:inherit;font-size:12px;padding:6px 14px;border-radius:5px;border:none;cursor:pointer;font-weight:600;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--dark);}
.btn-sec{background:#eee;color:#333;}
#stat{font-size:11px;color:#6b7a8d;margin-left:auto;}

/* TABELA */
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{background:#1f3864;color:#fff;font-size:11.5px;font-weight:600;padding:8px 10px;text-align:left;white-space:nowrap;}
tbody tr:hover td{background:#f0f4ff;}
tbody tr:nth-child(even) td{background:#f8f9fc;}
td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:middle;}
td.ime{font-weight:700;color:var(--dark);}
.badge-neaktivan{display:inline-block;background:#fce8e6;color:var(--red);font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px;}
.saved{color:var(--green);font-size:11px;}
.edit-inp{font:inherit;font-size:11.5px;padding:3px 6px;border:1px solid #ddd;border-radius:4px;width:100%;}
.edit-inp:focus{outline:none;border-color:var(--blue);}

/* TOGGLE */
.toggle{position:relative;display:inline-block;width:36px;height:20px;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:20px;transition:.3s;}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.slider{background:var(--green);}
input:checked+.slider:before{transform:translateX(16px);}
.toggle-cell{text-align:center;}

/* MODAL — novi kupac */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal.on{display:flex;}
.modal-box{background:#fff;border-radius:10px;padding:24px;min-width:360px;max-width:500px;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.modal-box h3{margin-bottom:16px;font-size:15px;color:var(--dark);}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:11px;font-weight:600;color:#6b7a8d;margin-bottom:3px;}
.fg input,.fg textarea{width:100%;font:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:5px;}
.fg textarea{resize:vertical;min-height:60px;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-btns{display:flex;gap:8px;margin-top:14px;}
.modal-btns button{flex:1;font:inherit;font-size:12px;padding:8px;border-radius:5px;border:none;cursor:pointer;font-weight:600;}
.btn-save{background:var(--blue);color:#fff;}
.btn-cancel{background:#eee;color:#333;}
.msg{font-size:12px;margin-top:8px;padding:6px 10px;border-radius:4px;}
.msg.ok{background:#e6f4ea;color:var(--green);}
.msg.err{background:#fce8e6;color:var(--red);}
.empty{text-align:center;padding:30px;color:#999;}
</style>
</head>
<body>
<header>
  <h1><img src="logo-bijeli.png" alt="JoPeX" style="height:30px;vertical-align:middle;margin-right:8px;">Kupci</h1>
  <nav>
    <a href="home.html">← Početna</a>
    <a href="#" id="logout">Izlaz</a>
  </nav>
</header>

<main>
  <div class="toolbar">
    <input type="text" id="search" placeholder="🔍 Pretraži po nazivu, telefonu, gradu..." oninput="render()">
    <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:#6b7a8d;cursor:pointer;">
      <input type="checkbox" id="fil-neaktivni" onchange="render()"> Prikaži neaktivne
    </label>
    <button class="btn btn-primary" onclick="openModal()">+ Novi kupac</button>
    <span id="stat"></span>
  </div>
  <div class="card">
    <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>Naziv / Ime</th>
          <th>Telefon</th>
          <th>Grad</th>
          <th>Adresa</th>
          <th>Email</th>
          <th>Napomena</th>
          <th style="text-align:center">Aktivan</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8" class="empty">Učitavanje...</td></tr>
      </tbody>
    </table>
    </div>
  </div>
</main>

<!-- Modal novi kupac -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>+ Novi kupac</h3>
    <div class="fg"><label>Naziv / Ime *</label><input type="text" id="n-naziv" placeholder="Mika Petrović ili Firma d.o.o."></div>
    <div class="r2">
      <div class="fg"><label>Telefon</label><input type="text" id="n-tel" placeholder="+387 6X XXX XXX"></div>
      <div class="fg"><label>Grad</label><input type="text" id="n-grad" placeholder="Banja Luka"></div>
    </div>
    <div class="fg"><label>Adresa</label><input type="text" id="n-adr" placeholder="Ulica bb"></div>
    <div class="fg"><label>Email</label><input type="email" id="n-email" placeholder="kupac@email.com"></div>
    <div class="fg"><label>Napomena</label><textarea id="n-nap" placeholder="Interna napomena..."></textarea></div>
    <div id="modal-msg"></div>
    <div class="modal-btns">
      <button class="btn-save" onclick="sacuvajNovog()">✓ Sačuvaj</button>
      <button class="btn-cancel" onclick="closeModal()">Otkaži</button>
    </div>
  </div>
</div>

<script>
const API='';
let kupci=[], isAdmin=false;

function esc(s){return s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function load(){
  try{
    const r=await fetch(API+'/api/config/kupci');
    if(!r.ok) throw new Error();
    kupci=await r.json();
    render();
  }catch(e){
    document.getElementById('tbody').innerHTML='<tr><td colspan="8" class="empty">Greška pri učitavanju.</td></tr>';
  }
}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const prikaziNeakt=document.getElementById('fil-neaktivni').checked;
  let rows=kupci.filter(k=>{
    if(!prikaziNeakt && k.aktivan===false) return false;
    if(q && !['naziv','telefon','grad','adresa','email'].some(f=>k[f]&&String(k[f]).toLowerCase().includes(q))) return false;
    return true;
  });
  document.getElementById('stat').textContent=rows.length+' / '+kupci.length+' kupaca';
  if(!rows.length){
    document.getElementById('tbody').innerHTML='<tr><td colspan="8" class="empty">Nema kupaca.</td></tr>';
    return;
  }
  document.getElementById('tbody').innerHTML=rows.map(k=>`
    <tr id="row-${k.id}">
      <td class="ime">${esc(k.naziv)}${k.aktivan===false?'<span class="badge-neaktivan">NEAKTIVAN</span>':''}</td>
      <td><input class="edit-inp" value="${esc(k.telefon||'')}" placeholder="—" onchange="sacuvajPolje(${k.id},'telefon',this.value)"></td>
      <td><input class="edit-inp" value="${esc(k.grad||'')}" placeholder="—" onchange="sacuvajPolje(${k.id},'grad',this.value)"></td>
      <td><input class="edit-inp" value="${esc(k.adresa||'')}" placeholder="—" onchange="sacuvajPolje(${k.id},'adresa',this.value)"></td>
      <td><input class="edit-inp" value="${esc(k.email||'')}" placeholder="—" onchange="sacuvajPolje(${k.id},'email',this.value)"></td>
      <td><input class="edit-inp" value="${esc(k.napomena||'')}" placeholder="—" onchange="sacuvajPolje(${k.id},'napomena',this.value)"></td>
      <td class="toggle-cell">
        <label class="toggle">
          <input type="checkbox" ${k.aktivan!==false?'checked':''} onchange="sacuvajPolje(${k.id},'aktivan',this.checked)">
          <span class="slider"></span>
        </label>
      </td>
      <td><span class="saved" id="saved-${k.id}"></span></td>
    </tr>
  `).join('');
}

async function sacuvajPolje(id, field, value){
  try{
    const r=await fetch(`${API}/api/config/kupci/${id}`,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({[field]:value})
    });
    if(!r.ok) throw new Error();
    const k=kupci.find(k=>k.id===id);
    if(k) k[field]=value;
    const sv=document.getElementById('saved-'+id);
    if(sv){sv.textContent='✓';setTimeout(()=>sv.textContent='',2000);}
  }catch(e){alert('Greška pri čuvanju.');load();}
}

function openModal(){
  ['n-naziv','n-tel','n-grad','n-adr','n-email','n-nap'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  document.getElementById('modal-msg').innerHTML='';
  document.getElementById('modal').classList.add('on');
  document.getElementById('n-naziv').focus();
}

function closeModal(){
  document.getElementById('modal').classList.remove('on');
}

async function sacuvajNovog(){
  const naziv=(document.getElementById('n-naziv').value||'').trim();
  const msg=document.getElementById('modal-msg');
  if(!naziv){msg.innerHTML='<div class="msg err">Naziv je obavezan.</div>';return;}
  try{
    const r=await fetch(API+'/api/config/kupci',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        naziv,
        telefon:document.getElementById('n-tel').value.trim()||null,
        grad:document.getElementById('n-grad').value.trim()||null,
        adresa:document.getElementById('n-adr').value.trim()||null,
        email:document.getElementById('n-email').value.trim()||null,
        napomena:document.getElementById('n-nap').value.trim()||null,
      })
    });
    if(!r.ok) throw new Error();
    const novi=await r.json();
    kupci.unshift(novi);
    render();
    msg.innerHTML='<div class="msg ok">✓ Kupac sačuvan.</div>';
    setTimeout(closeModal,1200);
  }catch(e){msg.innerHTML='<div class="msg err">Greška pri čuvanju.</div>';}
}

document.getElementById('logout').onclick=async e=>{
  e.preventDefault();
  await fetch(API+'/api/auth/logout',{method:'POST'});
  location.href='login.html';
};

// Zatvori modal klikom van
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal')) closeModal();
});

// Auth provjera
fetch(API+'/api/auth/me').then(r=>{
  if(!r.ok){location.href='login.html';return;}
  return r.json();
}).then(u=>{
  if(!u) return;
  isAdmin=u.rola==='admin';
  if(!isAdmin && !u.moze_ugovarati && !u.moze_prodavati){
    location.href='home.html';return;
  }
  load();
}).catch(()=>location.href='login.html');
</script>
</body>
</html>
