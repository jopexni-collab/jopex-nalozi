<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radni nalozi – JoPeX</title>
<style>
:root{--blue:#1a5fa8;--dark:#134a85;--bg:#f3f5f8;--border:#dde3ea;--red:#c0392b;--green:#1f8a4c;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);}
header{background:var(--blue);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
header h1{margin:0;font-size:17px;}
header nav{display:flex;gap:12px;align-items:center;}
header nav a{color:#fff;text-decoration:none;font-size:12.5px;opacity:.9;
  border:1px solid rgba(255,255,255,.4);padding:5px 11px;border-radius:6px;}
header nav a:hover{opacity:1;background:rgba(255,255,255,.12);}
#who{font-size:12.5px;opacity:.8;}
main{max-width:1600px;margin:18px auto;padding:0 14px;}
.toolbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.toolbar input,.toolbar select{font:inherit;font-size:13px;padding:7px 10px;
  border:1px solid var(--border);border-radius:6px;background:#fff;}
.toolbar input{min-width:220px;}
#stat{font-size:12px;color:#6b7a8d;margin-left:auto;}
.wrap{max-height:78vh;overflow:auto;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
table{width:100%;border-collapse:collapse;background:#fff;font-size:12.5px;}
th{background:#eef2f7;color:var(--dark);text-align:left;padding:9px 10px;
   font-weight:700;white-space:nowrap;position:sticky;top:0;z-index:1;}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:#f8fafc;}
td.r{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;}
td.note{max-width:240px;white-space:normal;color:#444;font-size:12px;}
/* Status badge - normalni prikaz */
.badge{display:inline-block;padding:3px 9px;border-radius:11px;font-size:11px;font-weight:600;white-space:nowrap;}
.s1{background:#eceff3;color:#5a6577;}
.s2{background:#dceafc;color:#1a5fa8;}
.s3{background:#fef0d8;color:#a86a00;}
.s4{background:#dcf3e3;color:#1f8a4c;}
.s5{background:#fbdfdf;color:#b32a2a;}
/* Status celija - klikabilna */
td.status-cell{cursor:pointer;position:relative;}
td.status-cell:hover .badge{outline:2px solid var(--blue);outline-offset:2px;}
td.status-cell .hint{font-size:9px;color:#aaa;display:block;margin-top:2px;}
/* Inline status select - pojavljuje se na klik */
.status-select{
  font:inherit;font-size:12px;padding:3px 6px;
  border:2px solid var(--blue);border-radius:8px;
  background:#fff;cursor:pointer;outline:none;
  box-shadow:0 2px 8px rgba(26,95,168,.2);
}
.saving{opacity:.5;pointer-events:none;}
.saved-flash{animation:flash .6s ease;}
@keyframes flash{0%{background:#dcf3e3;}100%{background:transparent;}}
.late{color:var(--red);font-weight:700;}
.empty{padding:40px;text-align:center;color:#6b7a8d;}
a.lk{color:var(--blue);font-size:11.5px;text-decoration:none;}
a.lk:hover{text-decoration:underline;}
</style>
</head>
<body>
<header>
  <h1>📊 Radni nalozi</h1>
  <nav>
    <span id="who"></span>
    <a href="index.html">+ Novi nalog</a>
    <a href="#" id="logout">Odjava</a>
  </nav>
</header>
<main>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Pretraži (naručilac, napomena, materijal...)">
    <select id="fStatus">
      <option value="">Svi statusi</option>
      <option>Nije Započeto</option><option>Zakazano</option><option>U radu</option>
      <option>Čeka isporuku</option><option>Završeno</option><option>Otkazano</option>
    </select>
    <span id="stat"></span>
  </div>
  <div class="wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"><tr><td colspan="20" class="empty">Učitavanje...</td></tr></tbody>
    </table>
  </div>
</main>

<script>
const API = '';
const STATUSI = ['Nije Započeto','Zakazano','U radu','Čeka isporuku','Završeno','Otkazano'];
let all = [], isAdmin = false;

function sc(s){
  return {'Nije Započeto':'s1','Zakazano':'s2','U radu':'s3',
          'Čeka isporuku':'s3','Završeno':'s4','Otkazano':'s5'}[s]||'s1';
}
function fd(d){ if(!d) return ''; return new Date(d).toLocaleDateString('sr-Latn-BA',{day:'2-digit',month:'2-digit',year:'2-digit'}); }
function fm(n){ return (parseFloat(n)||0).toLocaleString('sr-Latn-BA',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s){ return s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function lk(u){ return u?`<a class="lk" href="${esc(u)}" target="_blank" rel="noopener">otvori ↗</a>`:''; }

// ─── Inline status izmjena ────────────────────────────────────────────────
// Klik na status ćeliju → badge se zamijeni select dropdownom
// Promjena u dropdownu → PATCH na server → badge se vrati sa novim statusom
function makeStatusCell(r) {
  return `<td class="status-cell" data-rbr="${r.r_br}" data-status="${esc(r.status)}">
    <span class="badge ${sc(r.status)}">${esc(r.status)}</span>
    <span class="hint">klikni za promjenu</span>
  </td>`;
}

async function changeStatus(td, rBr, newStatus) {
  td.classList.add('saving');
  try {
    const res = await fetch(`${API}/api/proizvodnja/${rBr}`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({status: newStatus}),
    });
    if (!res.ok) throw new Error('Greška');
    // Ažuriraj lokalne podatke
    const row = all.find(r => r.r_br == rBr);
    if (row) row.status = newStatus;
    // Vrati badge sa novim statusom
    td.dataset.status = newStatus;
    td.innerHTML = `<span class="badge ${sc(newStatus)}">${esc(newStatus)}</span>
      <span class="hint">klikni za promjenu</span>`;
    td.classList.remove('saving');
    td.classList.add('saved-flash');
    // Ažuriraj filter stat
    renderStat();
  } catch(err) {
    td.classList.remove('saving');
    td.innerHTML = `<span class="badge ${sc(td.dataset.status)}">${esc(td.dataset.status)}</span>
      <span class="hint" style="color:var(--red)">greška, pokušaj ponovo</span>`;
  }
}

// Delegirani event listener na tbody - efikasnije od listenera na svakoj ćeliji
document.getElementById('tbody').addEventListener('click', function(e) {
  const td = e.target.closest('td.status-cell');
  if (!td) return;
  // Ako je već otvoren select na ovoj ćeliji, ignoriši
  if (td.querySelector('.status-select')) return;

  const currentStatus = td.dataset.status;
  const rBr = td.dataset.rbr;

  // Zamijeni sadržaj sa select dropdownom
  const opts = STATUSI.map(s =>
    `<option value="${s}"${s===currentStatus?' selected':''}>${s}</option>`
  ).join('');
  td.innerHTML = `<select class="status-select" autofocus>
    ${opts}
  </select>`;

  const sel = td.querySelector('.status-select');
  sel.focus();

  // Promjena vrijednosti → sačuvaj
  sel.addEventListener('change', function() {
    const newStatus = sel.value;
    changeStatus(td, rBr, newStatus);
  });

  // Klik van dropdown-a → zatvori bez čuvanja
  sel.addEventListener('blur', function() {
    // Malo kašnjenje da change event može proći ako je izabrano
    setTimeout(() => {
      if (td.querySelector('.status-select')) {
        td.innerHTML = `<span class="badge ${sc(currentStatus)}">${esc(currentStatus)}</span>
          <span class="hint">klikni za promjenu</span>`;
      }
    }, 200);
  });
});

function renderStat() {
  const q  = document.getElementById('search').value.trim().toLowerCase();
  const sf = document.getElementById('fStatus').value;
  let rows = all;
  if (sf) rows = rows.filter(r => r.status === sf);
  if (q)  rows = rows.filter(r =>
    [r.narucilac,r.napomena,r.materijal,r.ugovorio,r.zadatak]
      .some(f => f && String(f).toLowerCase().includes(q))
  );
  document.getElementById('stat').textContent = `${rows.length} od ${all.length} naloga`;
  return rows;
}

function buildHeader() {
  const base = ['R.Br.','Zadatak','Prioritet','Ugovorio','Naručilac','Materijal',
                 'Status','Početak','Plan. završetak','Dana','Napomena','Skica','Ponuda'];
  const fin  = ['Ugovoreno','Avans','Za naplatu'];
  const cols = isAdmin ? [...base, ...fin] : base;
  document.getElementById('thead').innerHTML =
    '<tr>' + cols.map(c=>`<th>${c}</th>`).join('') + '</tr>';
}

function render() {
  const rows = renderStat();

  if (!rows.length) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="20" class="empty">Nema naloga.</td></tr>';
    return;
  }

  document.getElementById('tbody').innerHTML = rows.map(r => {
    const base = `
      <td>${r.r_br}</td>
      <td>${esc(r.zadatak)}</td>
      <td>${esc(r.prioritet)}</td>
      <td>${esc(r.ugovorio)}</td>
      <td>${esc(r.narucilac)}</td>
      <td>${esc(r.materijal)}</td>
      ${makeStatusCell(r)}
      <td>${fd(r.pocetak)}</td>
      <td>${fd(r.planirani_zavrsetak)}</td>
      <td class="${r.broj_dana!=null&&r.broj_dana<0?'late':''}">${r.broj_dana??''}</td>
      <td class="note">${esc(r.napomena)}</td>
      <td>${lk(r.link_skica)}</td>
      <td>${lk(r.link_ponuda)}</td>`;
    const fin = isAdmin ? `
      <td class="r">${fm(r.ugovorena_suma)}</td>
      <td class="r">${fm(r.avans)}</td>
      <td class="r">${fm(r.za_naplatu)}</td>` : '';
    return `<tr>${base}${fin}</tr>`;
  }).join('');
}

async function checkAuth() {
  try {
    const r = await fetch(API + '/api/auth/me');
    if (!r.ok) { location.href = 'login.html'; return; }
    const u = await r.json();
    isAdmin = u.rola === 'admin';
    document.getElementById('who').textContent = '👤 ' + u.ime_prezime;
    buildHeader();
    load();
  } catch { location.href = 'login.html'; }
}

async function load() {
  try {
    const r = await fetch(API + '/api/proizvodnja');
    if (!r.ok) { if(r.status===401){location.href='login.html';return;} throw new Error(); }
    all = await r.json();
    render();
  } catch {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="20" class="empty">Greška pri učitavanju.</td></tr>';
  }
}

document.getElementById('logout').onclick = async e => {
  e.preventDefault();
  await fetch(API + '/api/auth/logout', {method:'POST'});
  location.href = 'login.html';
};
document.getElementById('search').addEventListener('input', render);
document.getElementById('fStatus').addEventListener('change', render);

checkAuth();
</script>
</body></html>
