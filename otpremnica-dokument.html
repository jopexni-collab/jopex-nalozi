<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Otpremnica – JoPeX</title>
<style>
:root{--blue:#1a5fa8;--dark:#134a85;--bg:#f0f2f5;--border:#d0d7de;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:#1a2733;font-size:14px;}

.toolbar{background:var(--blue);color:#fff;padding:10px 16px;display:flex;justify-content:space-between;
  align-items:center;position:sticky;top:0;}
.toolbar h1{font-size:15px;font-weight:700;}
.btn-print{background:#fff;color:var(--blue);border:none;border-radius:6px;font:inherit;font-weight:700;
  font-size:12.5px;padding:8px 14px;cursor:pointer;min-height:36px;}

.dok{max-width:720px;margin:18px auto;background:#fff;border:1px solid var(--border);border-radius:10px;
  padding:28px 24px;}

/* ── MEMORANDUM (ZAGLAVLJE) — TODO: prilagoditi stvarnim podacima firme ── */
.memo{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--blue);
  padding-bottom:16px;margin-bottom:20px;}
.memo-naziv{font-size:22px;font-weight:800;color:var(--dark);letter-spacing:.5px;}
.memo-info{font-size:11.5px;color:#6b7a8d;line-height:1.6;margin-top:4px;}
.memo-doc-tip{text-align:right;font-size:13px;color:#6b7a8d;}
.memo-doc-tip b{display:block;font-size:17px;color:var(--dark);}

.meta-red{display:flex;justify-content:space-between;font-size:12.5px;color:#6b7a8d;margin-bottom:18px;
  flex-wrap:wrap;gap:8px;}

.kupac-box{background:#f7f8fa;border-radius:8px;padding:12px 16px;margin-bottom:20px;}
.kupac-box .lbl{font-size:10.5px;font-weight:700;color:#8b96a5;text-transform:uppercase;letter-spacing:.5px;}
.kupac-box .naziv{font-size:15px;font-weight:700;color:#1a2733;margin-top:2px;}
.kupac-box .adresa{font-size:12.5px;color:#6b7a8d;margin-top:2px;}

table{width:100%;border-collapse:collapse;margin-bottom:20px;}
thead th{background:#1f3864;color:#fff;font-size:11.5px;padding:8px 10px;text-align:left;}
thead th.c{text-align:center;}
tbody td{padding:8px 10px;border-bottom:1px solid #e8eaed;font-size:12.5px;}
tbody td.c{text-align:center;}
tbody tr:nth-child(even) td{background:#f7f8fa;}

.napomena{font-size:11px;color:#9aa5b1;margin-top:10px;line-height:1.5;}

.potpisi{display:flex;justify-content:space-between;margin-top:44px;}
.potpis-polje{width:42%;text-align:center;}
.potpis-linija{border-top:1px solid #999;padding-top:6px;font-size:11px;color:#6b7a8d;}

.stanje-msg{text-align:center;color:#9aa5b1;font-size:13px;padding:60px 20px;}

@media print{
  body{background:#fff;}
  .toolbar{display:none;}
  .dok{border:none;margin:0;max-width:100%;}
}
</style>
</head>
<body>

<div class="toolbar">
  <h1>📄 Otpremnica</h1>
  <button class="btn-print" onclick="window.print()">🖨️ Štampaj / Sačuvaj kao PDF</button>
</div>

<div class="dok" id="dok">
  <div class="stanje-msg" id="stanje-msg">Učitavanje...</div>
</div>

<script>
/* ── PODACI O FIRMI (MEMORANDUM) ──────────────────────────────────────
   TODO: JoPeX — po potrebi izmijeni ove podatke na tačne (adresa, PIB, kontakt). */
const FIRMA = {
  naziv: 'JoPeX',
  adresa: '', // npr. "Ulica i broj, 88000 Mostar, BiH"
  pib: '',    // npr. "PIB: 123456789012"
  kontakt: '', // npr. "Tel: +387 XX XXX XXX  ·  info@jopex.ba"
};

const API='';
function esc(s){return s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fd(d){if(!d)return'';const dt=new Date(d);return dt.toLocaleDateString('sr-Latn-BA');}

function getToken(){
  return new URLSearchParams(location.search).get('token')||'';
}

async function ucitaj(){
  const token=getToken();
  const dok=document.getElementById('dok');
  if(!token){
    dok.innerHTML='<div class="stanje-msg">Nedostaje link ka otpremnici.</div>';
    return;
  }
  try{
    const r=await fetch(`${API}/api/otpremnice-javno/${encodeURIComponent(token)}`);
    const otp=await r.json();
    if(!r.ok) throw new Error(otp.error||'Otpremnica nije pronađena.');

    document.title=`Otpremnica ${otp.broj} – JoPeX`;

    dok.innerHTML=`
      <div class="memo">
        <div>
          <div class="memo-naziv">${esc(FIRMA.naziv)}</div>
          <div class="memo-info">
            ${FIRMA.adresa?esc(FIRMA.adresa)+'<br>':''}
            ${FIRMA.pib?esc(FIRMA.pib)+'<br>':''}
            ${FIRMA.kontakt?esc(FIRMA.kontakt):''}
          </div>
        </div>
        <div class="memo-doc-tip"><b>OTPREMNICA</b>${esc(otp.broj)}</div>
      </div>

      <div class="meta-red">
        <span>Datum: <b>${fd(otp.datum)}</b></span>
        <span>Izdao: ${esc(otp.komercijalista_ime||'—')}</span>
      </div>

      <div class="kupac-box">
        <div class="lbl">Kupac</div>
        <div class="naziv">${esc(otp.kupac_naziv||'—')}</div>
        ${otp.kupac_adresa?`<div class="adresa">${esc(otp.kupac_adresa)}</div>`:''}
        ${otp.kupac_grad?`<div class="adresa">${esc(otp.kupac_grad)}</div>`:''}
      </div>

      <table>
        <thead>
          <tr>
            <th class="c" style="width:36px">Rb</th>
            <th>Šifra</th>
            <th>Naziv artikla</th>
            <th class="c" style="width:110px">Količina</th>
          </tr>
        </thead>
        <tbody>
          ${otp.stavke.map(s=>{
            const dim = s.duzina_cm && s.visina_cm
              ? ` <span style="color:#9aa5b1;font-size:11px;">(${s.duzina_cm}${s.debljina_cm?`×${s.visina_cm}×${s.debljina_cm}`:`×${s.visina_cm}`} cm)</span>`
              : '';
            return `
            <tr>
              <td class="c">${s.rb}</td>
              <td>${esc(s.sifra)}</td>
              <td>${esc(s.naziv)}${dim}</td>
              <td class="c">${s.kolicina} ${esc(s.jed_mjera||'')}</td>
            </tr>
          `;}).join('')}
        </tbody>
      </table>

      <div class="potpisi">
        <div class="potpis-polje"><div class="potpis-linija">Izdao (JoPeX)</div></div>
        <div class="potpis-polje"><div class="potpis-linija">Primio (kupac)</div></div>
      </div>

      <div class="napomena">Ovaj dokument potvrđuje preuzimanje navedene robe. Ne predstavlja fiskalni račun.</div>
    `;
  }catch(e){
    dok.innerHTML=`<div class="stanje-msg">${esc(e.message)}</div>`;
  }
}
ucitaj();
</script>
</body>
</html>
